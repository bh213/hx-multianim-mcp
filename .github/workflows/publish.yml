name: Publish to npm

on:
  push:
    branches:
      - master
    paths:
      - 'package.json'

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> "$GITHUB_OUTPUT"

      - name: Check if version exists on npm
        id: check
        run: |
          if npm view @bh213/hx-multianim-mcp@${{ steps.version.outputs.version }} version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version already published
        if: steps.check.outputs.exists == 'true'
        run: echo "Version ${{ steps.version.outputs.version }} already exists on npm. Skipping publish."

      - uses: actions/setup-node@v4
        if: steps.check.outputs.exists == 'false'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm ci
        if: steps.check.outputs.exists == 'false'
      - run: npm run build --if-present
        if: steps.check.outputs.exists == 'false'
      - run: npm publish --access public
        if: steps.check.outputs.exists == 'false'
      - name: Create git tag
        if: steps.check.outputs.exists == 'false'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
